# OpenSSF Scorecard — automated supply-chain security scoring.
# Publishes results to the OpenSSF API (the README badge) and to the repo's
# code-scanning (Security) tab. See https://github.com/ossf/scorecard-action
name: Scorecard supply-chain security
on:
  branch_protection_rule:
  schedule:
    - cron: '20 7 * * 1' # weekly, Monday 07:20 UTC
  push:
    branches: ["main"]

# Least privilege at the top; the analysis job requests exactly what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the SARIF to code-scanning
      id-token: write        # publish results to the OpenSSF API (the badge)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # publish so the badge (https://api.securityscorecards.dev/...) is live
          # and results are visible on the public OpenSSF viewer.
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
