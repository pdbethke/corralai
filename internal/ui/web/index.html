// ---- Floating agent windows ----
// Each entry: { el, bodyEl, detailData, askBox }
// The ask footer (input + button + answer slot) lives in el, OUTSIDE bodyEl,
// so tick calls to renderAgentWindowBody() never touch or recreate the input.
const agentWindows = new Map();
let awZ = 100;                  // z-index counter — raised on any window interaction
let activeWinDrag = null;       // { el, ox, oy } — set on mousedown, cleared on mouseup

// Global drag move + end (shared across all windows to avoid per-window listener spam)
document.addEventListener('mousemove', ev => {
  if (!activeWinDrag) return;
  let nx = ev.clientX - activeWinDrag.ox;
  let ny = ev.clientY - activeWinDrag.oy;
  // Clamp: keep the window fully visible (min 40px top so title stays reachable)
  nx = Math.max(0, Math.min(window.innerWidth - activeWinDrag.el.offsetWidth, nx));
  ny = Math.max(40, Math.min(window.innerHeight - 60, ny));
  activeWinDrag.el.style.left = nx + 'px';
  activeWinDrag.el.style.top = ny + 'px';
});
document.addEventListener('mouseup', () => { activeWinDrag = null; });

function openAgentWindow(name) {
  if (agentWindows.has(name)) {
    // Raise the existing window and focus its input
    const win = agentWindows.get(name);
    awZ++;
    win.el.style.zIndex = awZ;
    const inp = win.el.querySelector('.aw-ask-input');
    if (inp) inp.focus();
    return;
  }

  const layer = document.getElementById('windows');
  // Cascade-offset so new windows don't stack exactly
  const numWin = agentWindows.size;
  const offset = (numWin % 8) * 30;
  const left = Math.min(90 + offset, window.innerWidth - 390);
  const top = Math.min(80 + offset, window.innerHeight - 340);

  const el = document.createElement('div');
  el.className = 'aw-win';
  el.style.left = left + 'px';
  el.style.top = top + 'px';
  awZ++;
  el.style.zIndex = awZ;

  // Build title bar from current state (set once; not re-rendered on tick)
  const a = (lastState.active_agents || []).find(x => x.name === name) || {};
  // The model/backend live in topology (report_host / HostBook), not active_agents.
  const topo = (lastState.topology || []).find(x => x.agent === name) || {};
  const model = a.model || topo.model || '';
  const leaf = a.parent ? (name.split('/').pop() || name) : name;
  const dn = displayName(leaf);
  const role = a.role || topo.role || '';
  const mi = modelInfo(model);
  // Always emit the badge span (hidden if the model isn't known yet — report_host
  // populates topology on a timer); renderAgentWindowBody fills it in on a later tick.
  const modelBadge = `<span class="aw-badge"${model ? '' : ' style="display:none"'} title="${esc((topo.backend ? topo.backend + ' · ' : '') + model)}">${esc(model ? (mi && mi.label ? mi.label : model) : '')}</span>`;

  // Title bar + body + persistent ask footer — footer is NEVER inside bodyEl
  el.innerHTML =
    `<div class="aw-title">` +
      `<b>${esc(dn)}</b>` +
      (role ? `<span class="aw-role">${esc(role)}</span>` : '') +
      modelBadge +
      `<span class="aw-close" title="close">✕</span>` +
    `</div>` +
    `<div class="aw-body"><div class="ir" style="font-style:italic;font-size:12px">loading…</div></div>` +
    `<div class="aw-footer">` +
      `<div class="aw-askbox">` +
        `<input class="aw-ask-input" id="aw-ask-${name.replace(/[^a-zA-Z0-9_-]/g,'_')}" ` +
          `placeholder="what have you done? what's blocking you?" autocomplete="off">` +
        `<button class="aw-ask-btn">ask</button>` +
      `</div>` +
      `<div class="aw-answer-slot"></div>` +
    `</div>`;

  layer.appendChild(el);

  const bodyEl = el.querySelector('.aw-body');
  const win = { el, bodyEl, detailData: null, askBox: { q: '', answer: '', loading: false } };
  agentWindows.set(name, win);

  // Raise to front on any interaction with this window
  el.addEventListener('mousedown', () => { awZ++; win.el.style.zIndex = awZ; }, true);

  // Wire close button (created once, persists — title bar innerHTML never changes after this)
  el.querySelector('.aw-close').addEventListener('click', ev => {
    ev.stopPropagation();
    agentWindows.delete(name);
    el.remove();
  });

  // Drag — title bar mousedown starts the drag; close-btn click is excluded
  const titleBar = el.querySelector('.aw-title');
  titleBar.addEventListener('mousedown', ev => {
    if (ev.target.classList.contains('aw-close')) return;
    activeWinDrag = { el, ox: ev.clientX - el.offsetLeft, oy: ev.clientY - el.offsetTop };
    ev.preventDefault();
  });

  // Per-window ask — Enter or button click
  const askInput = el.querySelector('.aw-ask-input');
  const askBtn = el.querySelector('.aw-ask-btn');
  askBtn.addEventListener('click', () => askAgentWindow(name));
  askInput.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); askAgentWindow(name); }
  });

  askInput.focus();

  // Fetch per-agent detail (/api/agent?name=) on open, then render body
  fetchWindowDetail(name);
}

async function fetchWindowDetail(name) {
  const win = agentWindows.get(name);
  if (!win) return;
  try {
    const r = await fetch('/api/agent?name=' + encodeURIComponent(name));
    if (r.ok) {

    if (agentWindows.has(name)) {
      agentWindows.get(name).bodyEl.innerHTML =
        '<div class="ir" style="font-style:italic;font-size:12px">couldn\'t reach the brain — retrying…</div>';
      setTimeout(() => fetchWindowDetail(name), 3000);
    }
  }
}

// renderAgentWindowBody: patches ONLY .aw-body — the ask footer is NOT touched.
// Called both on open (after fetchWindowDetail) and on every SSE tick via apply().
function renderAgentWindowBody(name) {
  const win = agentWindows.get(name);
  if (!win) return;

  const st = lastState;
  const a = (st.active_agents || []).find(x => x.name === name) || {};
  // Fill the title-bar model badge once topology (report_host) knows this agent's model.
  // Touches only the title span — never the ask input — so focus/drag are unaffected.
  const topo = (st.topology || []).find(x => x.agent === name) || {};
  const badgeModel = a.model || topo.model || '';
  const badgeEl = win.el.querySelector('.aw-badge');
  if (badgeEl && badgeModel && !badgeEl.textContent.trim()) {
    const bmi = modelInfo(badgeModel);
    badgeEl.textContent = (bmi && bmi.label) ? bmi.label : badgeModel;
    badgeEl.title = (topo.backend ? topo.backend + ' · ' : '') + badgeModel;
    badgeEl.style.display = '';
  }
  const claims = (st.live_claims || []).filter(c => c.agent === name);
  const done = (st.recent_completed || []).filter(d => d.agent_name === name);
  const kids = (st.active_agents || []).filter(x => x.parent === name);

  let h = '';

  if (a.parent) {
    const pn = a.parent;
    h += `<div class="irow"><span class="ir">subagent of </span><span style="cursor:pointer;color:var(--amber)" onclick="openAgentWindow('${esc(pn)}')">${esc(pn.split('/').pop() || pn)}</span></div>`;
  }
  if (kids.length) {
    h += `<div class="isec">subagents (${kids.length})</div>`;
    kids.forEach(k => {
      const kLeaf = k.name.split('/').pop() || k.name;
      h += `<div class="irow" style="cursor:pointer" onclick="openAgentWindow('${esc(k.name)}')"><span style="color:var(--amber)">${esc(displayName(kLeaf))}</span>${k.role ? ` <span class="ir">· ${esc(k.role)}</span>` : ''}</div>`;
    });
  }

  h += `<div class="isec">stats</div>`;
  h += `<div class="irow">active for <b>${ago(a.registered_ts)}</b> · last seen <b>${ago(a.last_active_ts)} ago</b></div>`;
  h += `<div class="irow">holding <b>${claims.length}</b> · completed <b>${done.length}</b></div>`;

  if (a.task) h += `<div class="isec">working on</div><div class="itask">${esc(a.task)}</div>`;

  if (claims.length) {
    h += `<div class="isec">holding</div>`;
    claims.forEach(c => {
      const conf = (st.live_claims || []).filter(x => x.path === c.path).length > 1;
      h += `<div class="irow"><span class="${conf ? 'iconf' : 'igreen'}">${esc(c.path)}</span>${c.reason ? ` <span class="ir">— ${esc(c.reason)}</span>` : ''}</div>`;
    });
  }
  if (done.length) {
    h += `<div class="isec">what they've done</div>`;
    done.forEach(d => { h += `<div class="irow ir">✓ ${esc(d.summary)}</div>`; });
  }

  const ad = win.detailData;
  if (ad) {
    h += `<div class="isec">live activity</div>`;
    if (!(ad.activity && ad.activity.length)) h += `<div class="irow ir">no recorded actions yet</div>`;
    (ad.activity || []).slice(0, 8).forEach(act => {
      h += `<div class="irow"><span class="igreen">${esc(act.action)}</span> <span class="ir">${ago(act.ts)} ago${summ(act.detail) ? ' · ' + esc(summ(act.detail)) : ''}</span></div>`;
    });
    if (ad.memory) {
      h += `<div class="isec">memory it can recall (${ad.memory.total}${ad.memory.shared_only ? ' shared' : ''})</div>`;
      (ad.memory.sample || []).slice(0, 5).forEach(m => {
        h += `<div class="irow" style="cursor:pointer" onclick="openEntryModal('${m.slug}')"><span style="color:var(--amber)">${esc(m.name || m.slug)}</span></div>`;
      });
    }
    if (ad.capabilities) {
      h += `<div class="isec">mcp endpoints it can use (${ad.capabilities.length})</div>`;
      if (!ad.capabilities.length) h += `<div class="irow ir">none available to it yet</div>`;
      ad.capabilities.forEach(e => { h += `<div class="irow"><span style="color:var(--amber)">${esc(e.name)}</span>${e.public ? ' <span class="ir">public</span>' : ''}</div>`; });
    }
  } else if (!h.includes('loading')) {
    // detailData not yet loaded — show placeholder without overwriting a real retry message
    h += `<div class="isec">live activity</div><div class="irow ir">fetching…</div>`;
  }

  // ONLY the body is updated — the ask footer (input/button/answer) is untouched
  win.bodyEl.innerHTML = h;
}

async function askAgentWindow(name) {
  const win = agentWindows.get(name);
  if (!win) return;
  const inp = win.el.querySelector('.aw-ask-input');
  const ansSlot = win.el.querySelector('.aw-answer-slot');
  const btn = win.el.querySelector('.aw-ask-btn');
  const q = inp ? inp.value.trim() : '';
  if (!q) return;

  win.askBox = { q, answer: '', loading: true };
  const nameLeaf = name.split('/').pop() || name;
  if (ansSlot) ansSlot.innerHTML = `<div class="aw-ans ir">…${esc(displayName(nameLeaf))} is checking its trail</div>`;
  if (btn) btn.disabled = true;

  try {
    const r = await fetch('/api/ask?skin='+encodeURIComponent(skinName), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent: name, question: q })
    });
    if (r.ok) {
      const d = await r.json();
      win.askBox = { q, answer: d.answer || '(no answer)', loading: false };
    } else {
      win.askBox = { q, answer: '(couldn\'t reach the narrator — ' + r.status + ')', loading: false };
    }
  } catch(_) {
    win.askBox = { q, answer: '(error reaching the narrator)', loading: false };
  }

  // Re-check the window still exists (user may have closed it while waiting)
  if (agentWindows.has(name)) {
    const w = agentWindows.get(name);
    const slot = w.el.querySelector('.aw-answer-slot');
    const b = w.el.querySelector('.aw-ask-btn');
    if (slot) slot.innerHTML = `<div class="aw-q2">▸ ${esc(w.askBox.q)}</div><div class="aw-ans">${esc(w.askBox.answer)}</div>`;
    if (b) b.disabled = false;
    // Clear input and restore focus — answer slot is NOT in .aw-body, so it's permanent
    const i = w.el.querySelector('.aw-ask-input');
    if (i) { i.value = ''; i.focus(); }
  }
}

function renderInspector(){
  const el=document.getElementById('inspector');
  if(!selected){ el.style.display='none'; return; }
  const st=lastState;
  let h=`<span class="ix" onclick="selected=null;renderInspector()">✕</span>`;
  if(selected.kind==='agent'){
    const name=selected.fullname||selected.label;
    const a=(st.active_agents||[]).find(x=>x.name===name)||{};
    const claims=(st.live_claims||[]).filter(c=>c.agent===name);
    const done=(st.recent_completed||[]).filter(d=>d.agent_name===name);
    const kids=(st.active_agents||[]).filter(x=>x.parent===name);
    h+=`<h3>${esc(displayName(selected.label))} <span class="irename" title="rename (display only, this browser)" onclick="renameBee('${(name||'').replace(/'/g,"\\'")}')">✎</span>${a.role?` <span style="color:var(--amber);font-size:12px">[${esc(a.role)}]</span>`:''}</h3><div class="isub">${esc(a.program||'agent')}${a.model?' · '+esc(a.model):''}${beeAlias[name]?` · really ${esc(name)}`:''}</div>`;
    if(a.parent) h+=`<div class="irow ir">subagent of <span class="p" style="cursor:pointer" onclick="selectAgent('${esc(a.parent)}')">${esc(a.parent.split('/').pop()||a.parent)}</span></div>`;
    if(kids.length){ h+=`<div class="isec">subagents (${kids.length})</div>`;
      kids.forEach(k=>{ const leaf=k.name.split('/').pop()||k.name; h+=`<div class="irow" style="cursor:pointer" onclick="selectAgent('${esc(k.name)}')"><span class="p">${esc(displayName(leaf))}</span>${k.role?` <span class="ir">· ${esc(k.role)}</span>`:''}</div>`; }); }
    h+=`<div class="isec">stats</div>`;
    h+=`<div class="irow">active for <b>${ago(a.registered_ts)}</b> · last seen <b>${ago(a.last_active_ts)} ago</b></div>`;
    h+=`<div class="irow">holding <b>${claims.length}</b> · completed <b>${done.length}</b></div>`;
    const mi=modelInfo(a.model);
    if(mi){ h+=`<div class="isec">model</div><div class="irow"><span class="p">${esc(mi.label)}</span>${mi.provider?` <span class="ir">· ${esc(mi.provider)}</span>`:''}${mi.note?`<div class="ir">${esc(mi.note)}</div>`:''}</div>`; }
    if(a.task) h+=`<div class="isec">working on</div><div class="itask">${esc(a.task)}</div>`;
    // ASK — a READ-ONLY debrief: the brain narrates as this bee from its recorded
    // trail. It cannot instruct or change the bee, so it can't derail the build.
    h+=`<div class="isec">ask ${esc(displayName(selected.label))} <span class="ir">· read-only debrief</span></div>`;
    h+=`<div class="askbox"><input id="askq" placeholder="what have you done? what's blocking you?" oninput="askDraft=this.value" onfocus="askFocused=true" onblur="askFocused=false" onkeydown="if(event.key==='Enter'){event.preventDefault();askAgent()}"><button onclick="askAgent()" ${askBox.loading?'disabled':''}>ask</button></div>`;
    if(askBox.agent===name){
      if(askBox.loading) h+=`<div class="askans ir">…${esc(displayName(name))} is checking its trail</div>`;
      else if(askBox.q) h+=`<div class="askq2">▸ ${esc(askBox.q)}</div><div class="askans">${esc(askBox.answer)}</div>`;
    }
    if(claims.length){ h+=`<div class="isec">holding</div>`; claims.forEach(c=>{ const conf=(st.live_claims||[]).filter(x=>x.path===c.path).length>1; h+=`<div class="irow"><span class="${conf?'iconf':'igreen'}">${esc(c.path)}</span>${c.reason?` <span class="ir">— ${esc(c.reason)}</span>`:''}</div>`; }); }
    if(done.length){ h+=`<div class="isec">what they've done</div>`; done.forEach(d=>h+=`<div class="irow ir">✓ ${esc(d.summary)}</div>`); }
    if(agentDetail){
      const ad=agentDetail;
      h+=`<div class="isec">live activity</div>`;
      if(!(ad.activity&&ad.activity.length)) h+=`<div class="irow ir">no recorded actions yet</div>`;
      (ad.activity||[]).slice(0,8).forEach(a=>{ h+=`<div class="irow"><span class="igreen">${esc(a.action)}</span> <span class="ir">${ago(a.ts)} ago${summ(a.detail)?' · '+esc(summ(a.detail)):''}</span></div>`; });
      if(ad.memory){
        h+=`<div class="isec">memory it can recall (${ad.memory.total}${ad.memory.shared_only?' shared':''})</div>`;
        (ad.memory.sample||[]).slice(0,5).forEach(m=>{ h+=`<div class="irow" style="cursor:pointer" onclick="openEntryModal('${m.slug}')"><span class="p">${esc(m.name||m.slug)}</span></div>`; });
      }
      if(ad.capabilities){
        h+=`<div class="isec">mcp endpoints it can use (${ad.capabilities.length})</div>`;
        if(!ad.capabilities.length) h+=`<div class="irow ir">none available to it yet</div>`;
        ad.capabilities.forEach(e=>h+=`<div class="irow"><span class="p">${esc(e.name)}</span>${e.public?' <span class="ir">public</span>':''}</div>`);
      }
    }
  } else {
    const path=selected.fullpath||selected.label;
    const holders=(st.live_claims||[]).filter(c=>c.path===path);
    h+=`<h3>${esc(selected.label)}</h3><div class="isub">${esc(path)}</div>`;
    if(holders.length>1) h+=`<div class="iconf">⚠ conflict — ${holders.length} agents working here</div>`;
    h+=`<div class="isec">held by</div>`;
    holders.forEach(c=>h+=`<div class="irow"><b>${esc(c.agent)}</b>${c.reason?` <span class="ir">— ${esc(c.reason)}</span>`:''}</div>`);
  }
  el.innerHTML=h; el.style.display='block';
  const aq=document.getElementById('askq'); // preserve the question across live re-renders
  if(aq){ aq.value=askDraft; if(askFocused){ aq.focus(); const v=aq.value; aq.value=''; aq.value=v; } }
}

// Fleet oracle panel — "ask the fleet" read-only NL→SQL→narrate panel.
// foState mirrors the askBox/askDraft pattern from the ask-a-bee panel.
let foDraft = '', foFocused = false;
let foState = {q:'', narration:'', columns:[], rows:[], sql:'', loading:false, err:''};
async function askFleet(){
  const el = document.getElementById('foq'); const q = (el ? el.value : foDraft).trim();
  if(!q) return;
  foState = {q, narration:'', columns:[], rows:[], sql:'', loading:true, err:''};
  foDraft = ''; renderFleetOracle();
  try{
    const r = await fetch('/api/ask_fleet', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({question:q})});
    if(r.ok){
      const d = await r.json();
      foState = {q, narration:d.narration||'', columns:d.columns||[], rows:d.rows||[], sql:d.sql||'', loading:false, err:''};
    } else {
      const t = await r.text();
      if(r.status===503){ foState = {q:'', narration:'', columns:[], rows:[], sql:'', loading:false, err:''}; renderFleetOracle(); return; }
      foState = {q, narration:'', columns:[], rows:[], sql:'', loading:false, err:'oracle error ('+r.status+'): '+t.trim()};
    }
  }catch(e){ foState = {q, narration:'', columns:[], rows:[], sql:'', loading:false, err:'error reaching fleet oracle'}; }
  renderFleetOracle();
}
async function checkFleetOracleAvailable(){
  // GET probe answers 200 {enabled} either way — no red 503 in the console.
  try{
    const r = await fetch('/api/ask_fleet');
    if(!r.ok) return false;
    const j = await r.json();
    return !!j.enabled;
  }catch(_){ return false; }
}
let foAvailable = false;
checkFleetOracleAvailable().then(ok => { foAvailable = ok; renderFleetOracle(); });
function renderFleetOracle(){
  const panel = document.getElementById('fleet-oracle');
  if(!panel) return;
  if(!foAvailable){ panel.innerHTML=''; return; }
  let h = `<div class="fo-hdr">ask the fleet <span style="color:var(--muted);font-size:10px">· read-only</span></div>`;
  h += `<div class="askbox"><input id="foq" placeholder="how many missions are running?" oninput="foDraft=this.value" onfocus="foFocused=true" onblur="foFocused=false" onkeydown="if(event.key==='Enter'){event.preventDefault();askFleet()}"><button onclick="askFleet()" ${foState.loading?'disabled':''}>ask</button></div>`;
  if(foState.loading){
    h += `<div class="fo-narration ir">…querying the fleet</div>`;
  } else if(foState.err){
    h += `<div class="fo-err">${esc(foState.err)}</div>`;
  } else if(foState.q){
    h += `<div class="fo-q2">▸ ${esc(foState.q)}</div>`;
    if(foState.narration) h += `<div class="fo-narration">${esc(foState.narration)}</div>`;
    if(foState.columns && foState.columns.length){
      h += `<details><summary>results (${(foState.rows||[]).length} rows)</summary>`;
      h += `<table class="fo-table"><thead><tr>${foState.columns.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead><tbody>`;
      (foState.rows||[]).forEach(row=>{ h += `<tr>${row.map(cell=>`<td>${esc(String(cell??''))}</td>`).join('')}</tr>`; });
      h += `</tbody></table></details>`;
    }
    if(foState.sql) h += `<details><summary>show query</summary><div class="fo-sql">${esc(foState.sql)}</div></details>`;
  }
  panel.innerHTML = h;
  const fq = document.getElementById('foq');
  if(fq){ fq.value=foDraft; if(foFocused){ fq.focus(); const v=fq.value; fq.value=''; fq.value=v; } }
}
