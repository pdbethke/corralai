<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CorralAI — the swarm</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
<style>
  :root { --bg:#0e1116; --fg:#e6e1d8; --muted:#8a8170; --amber:#e8a838; --red:#e8503a; --line:#33405a;
    --green:#8fdcab; --panel:#161b22; --sel:#1b2330; --card:rgba(20,25,32,.97);
    /* --stage-* are the CANVAS's own palette — the corral/comb/matrix rain always
       render on a dark stage, in BOTH chrome themes (grass/glow/rain need the dark
       ground to read). These are deliberately NOT redefined under html.light: the
       stage is the one thing the toggle must never touch, framed like the site's
       dark hero viewport sitting on a light page. */
    --stage-bg:#0e1116; --stage-fg:#e6e1d8; --stage-muted:#8a8170; --stage-amber:#e8a838;
    --stage-red:#e8503a; --stage-green:#8fdcab; --stage-line:#33405a; --stage-panel:#161b22; }
  html.light { --bg:#faf3e6; --fg:#241f18; --muted:#6b6152; --amber:#8f5e08; --red:#b8341f; --line:#ddd0b3;
    --green:#3f7a52; --panel:#f2e9d6; --sel:#ece0c4; --card:rgba(255,251,242,.98); }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
    font:14px/1.4 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif; overflow:hidden; }
  /* depth: a soft vignette behind the swarm canvas so nodes read as lit on a stage */
  body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 40%, transparent 52%, rgba(0,0,0,.42) 100%); }
  html.light body::before { background:radial-gradient(ellipse at 50% 40%, transparent 60%, rgba(40,40,60,.10) 100%); }
  #hud { position:fixed; top:0; left:0; right:0; height:42px; box-sizing:border-box; padding:10px 14px; display:flex;
    align-items:baseline; gap:14px; pointer-events:none; z-index:5; background:var(--bg); border-bottom:1px solid var(--line); }
  #hud b { font-size:16px; letter-spacing:.5px; color:var(--amber); }
  #hud .sub { color:var(--muted); }
  #hud .stat { margin-left:auto; color:var(--muted); }
  /* 3-column stage: left panels | swarm canvas | right action panels. The swarm
     lives in its OWN grid cell, so the side panels can never overlap it. The
     alternate tab views (progress/topology/memory) cover the whole stage. */
  #stage { position:fixed; inset:42px 0 24vh 0; display:grid; grid-template-columns:300px minmax(0,1fr) 344px; z-index:1; }
  #leftcol, #rightcol { overflow-y:auto; overflow-x:hidden; padding:12px 12px 18px; display:flex; flex-direction:column; gap:14px; background:var(--bg); }
  #leftcol { border-right:1px solid var(--line); }
  #rightcol { border-left:1px solid var(--line); }
  /* the stage is always dark, framed against the surrounding chrome (which
     flips light/dark with the toggle) — a dark viewport on a light page in
     light mode, mirroring the site's dark hero-in-a-window treatment. */
  #center { position:relative; display:flex; flex-direction:column; min-width:0; min-height:0;
    background:var(--stage-bg); box-shadow:inset 0 0 0 1px var(--stage-line); }
  html.light #center { box-shadow:inset 0 0 0 1px var(--stage-line), 0 8px 28px rgba(40,30,10,.18); }
  #legend { position:absolute; bottom:8px; left:10px; right:10px; color:var(--stage-muted); font-size:11px; z-index:2;
    pointer-events:none; line-height:1.9; }
  #legend .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin:0 4px 0 10px; vertical-align:middle; }
  #agents { color:var(--muted); font-size:12px; text-align:left; flex:none; }
  #agents .row { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.92; padding:1px 0; }
  #agents .feedhdr { color:#6b6452; font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
  /* clickable AGENTS roster — open a bee's detail without chasing it around the canvas */
  #agents .arow { display:flex; align-items:center; gap:7px; padding:3px 6px; border-radius:5px; cursor:pointer;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #agents .arow:hover { background:var(--panel); }
  #agents .arow.arowsel { background:var(--sel); outline:1px solid var(--line); }
  #agents .arow b { flex:none; }
  #agents .adot { width:8px; height:8px; border-radius:50%; flex:none; }
  #agents .ameta { color:#6b6452; font-size:10.5px; flex:none; }
  #agents .adoing { color:var(--muted); font-size:11px; margin-left:auto; overflow:hidden; text-overflow:ellipsis; font-family:ui-monospace,monospace; }
  #tasks { color:var(--muted); font-size:12px; text-align:left; }
  #tasks .feedhdr { color:#6b6452; font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
  #tasks .trow { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:2px 0; opacity:.95; }
  #tasks .tdot { display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:6px; vertical-align:middle; }
  /* Fleet Oracle panel — sibling to "ask a bee", same visual language. */
  #fleet-oracle { font-size:13px; flex:none; }
  #fleet-oracle .fo-hdr { color:#6b6452; font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  #fleet-oracle .askbox { display:flex; gap:6px; margin:4px 0 8px; }
  #fleet-oracle .askbox input { flex:1; background:var(--panel); border:1px solid var(--line); color:var(--fg);
    border-radius:6px; padding:6px 9px; font-size:12.5px; outline:none; }
  #fleet-oracle .askbox input:focus { border-color:var(--amber); }
  #fleet-oracle .askbox button { background:var(--amber); color:var(--bg); border:none; border-radius:6px;
    padding:0 12px; cursor:pointer; font-size:12px; font-weight:600; }
  #fleet-oracle .askbox button:disabled { opacity:.5; cursor:default; }
  #fleet-oracle .fo-narration { color:var(--fg); font-size:13px; line-height:1.5; font-style:italic;
    border-left:2px solid var(--amber); padding-left:9px; margin-bottom:6px; white-space:pre-wrap; }
  #fleet-oracle .fo-q2 { color:var(--muted); font-size:12px; margin:2px 0 3px; }
  #fleet-oracle .fo-err { color:var(--red); font-size:12px; margin-bottom:4px; }
  #fleet-oracle details { margin-top:4px; }
  #fleet-oracle summary { color:var(--muted); font-size:11px; cursor:pointer; text-transform:uppercase;
    letter-spacing:.4px; user-select:none; }
  #fleet-oracle summary:hover { color:var(--fg); }
  #fleet-oracle .fo-table { width:100%; border-collapse:collapse; font-size:11.5px; margin-top:5px; }
  #fleet-oracle .fo-table th { color:var(--amber); font-weight:600; text-align:left; padding:2px 6px 2px 0;
    border-bottom:1px solid var(--line); font-size:11px; text-transform:uppercase; letter-spacing:.3px; }
  #fleet-oracle .fo-table td { color:var(--fg); padding:2px 6px 2px 0; border-bottom:1px solid rgba(255,255,255,.04); }
  #fleet-oracle .fo-sql { font-family:ui-monospace,monospace; font-size:11px; color:var(--muted);
    white-space:pre-wrap; margin-top:5px; background:var(--panel); padding:7px 9px; border-radius:6px; }
  #findings { color:var(--muted); font-size:12px; text-align:left; flex:none; }
  #findings .feedhdr { color:#6b6452; font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
  #findings .frow { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:2px 0; }
  #findings .fsev { display:inline-block; min-width:54px; font-weight:600; text-transform:uppercase; font-size:10px; letter-spacing:.4px; }
  #findings .frow.hi { background:rgba(232,80,58,.12); border-radius:4px; padding-left:4px; }
  /* #exec — the live console docked along the bottom of the CENTER cell, under the
     swarm. The bees' tool-calls + real command runs scroll past like a build log. */
  #exec { position:fixed; left:0; right:0; bottom:0; height:24vh; overflow:auto; z-index:3;
    background:rgba(10,13,18,.96); border-top:1px solid var(--amber); padding:0 16px 10px; text-align:left;
    box-shadow:0 -12px 32px rgba(0,0,0,.55); }
  /* the console header (count + filter chips) floats: sticky to the top of the
     terminal so it stays put as the log auto-scrolls past underneath. */
  #exec .feedhdr { position:sticky; top:0; z-index:1; padding:7px 0 6px;
    background:linear-gradient(180deg, rgba(10,13,18,1) 78%, rgba(10,13,18,0)); }
  html.light #exec .feedhdr { background:linear-gradient(180deg, rgba(244,242,236,1) 78%, rgba(244,242,236,0)); }
  html.light #exec { background:rgba(244,242,236,.98); }
  #exec .xempty { color:var(--muted); font-style:italic; font-size:12px; padding:4px 6px; }
  #exec .feedhdr { color:#6b6452; font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  #exec .xblk { padding:2px 4px 3px; border-radius:4px; }
  #exec .xcmdline { display:flex; align-items:baseline; gap:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.5; }
  #exec .xprompt { color:var(--green); font-family:ui-monospace,monospace; font-weight:700; }
  #exec .xcmdline b { flex:none; }
  #exec .xcmd { flex:none; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11.5px; color:var(--fg);
    background:var(--panel); padding:1px 6px; border-radius:4px; }
  #exec .xbadge { flex:none; font-weight:700; font-size:12px; }
  #exec .xout { color:var(--muted); font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11px;
    padding-left:20px; white-space:pre-wrap; word-break:break-all; opacity:.82; line-height:1.45; }
  /* thought beats (the story engine's replay payoff): reasoning must read as
     visibly distinct from an action at a glance — italic, muted, no
     monospace command chrome or exit badge, a 💭 affix instead of the ❯
     prompt. The text itself is never truncated/ellipsized by CSS — it's the
     agent's verbatim words (see internal/brain/thought.go). */
  #exec .xthoughtline { white-space:normal; overflow-wrap:anywhere; }
  #exec .xthoughtico { flex:none; opacity:.85; }
  #exec .xthoughttext { color:var(--muted); font-style:italic; font-size:11.5px; line-height:1.5; }
  #exec .xcursor { color:var(--amber); font-family:ui-monospace,monospace; padding-left:3px; animation:xblink 1.05s step-start infinite; }
  @keyframes xblink { 50% { opacity:0; } }
  @keyframes xflash-pass { from { background:rgba(143,220,171,.30); } to { background:transparent; } }
  @keyframes xflash-fail { from { background:rgba(232,80,58,.30); } to { background:transparent; } }
  #exec .xblk.xflash-pass { animation:xflash-pass 1.2s ease-out; }
  #exec .xblk.xflash-fail { animation:xflash-fail 1.2s ease-out; }
  #progress { position:fixed; inset:42px 0 0 0; z-index:3; display:none; background:var(--bg); overflow:auto; padding:22px 0; }
  #progress.show { display:block; }
  #launch { position:fixed; inset:42px 0 0 0; z-index:3; display:none; background:var(--bg); overflow:auto; padding:22px 0; }
  #launch.show { display:block; }
  /* #topology — the ecosystem map: the brain + every host and the bees it runs. */
  #topology { position:fixed; inset:42px 0 0 0; z-index:3; display:none; background:var(--bg); overflow:auto; padding:22px 0; }
  #topology.show { display:block; }
  /* #files — the file-tree replay lens: the directory tree the herd touched,
     reconstructed from the tape's path claims, each file colored by its
     claiming agent (renderReplayFiles, shared from replay-player.js). */
  #files { position:fixed; inset:42px 0 0 0; z-index:3; display:none; background:var(--bg); overflow:auto; padding:22px 18px; }
  #files.show { display:block; }
  #files .cv-pane { max-width:840px; margin:0 auto; }
  #files .ft-note { color:var(--muted); font-size:12px; margin:0 0 12px; }
  #files .ft-empty { color:var(--muted); font-size:13px; font-style:italic; padding:8px 0; }
  #files .ft-tree { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px; line-height:1.65; }
  #files .ft-row { display:flex; align-items:center; gap:7px; white-space:nowrap; }
  #files .ft-dir { color:var(--muted); }
  #files .ft-caret { color:var(--muted); font-size:10px; }
  #files .ft-dname { color:var(--fg); font-weight:600; }
  #files .ft-badge { color:#f4c430; font-size:10.5px; margin-left:6px; }
  #files .ft-dot { width:9px; height:9px; border-radius:2px; flex:0 0 auto; box-sizing:border-box; }
  #files .ft-who { color:var(--muted); font-size:11px; margin-left:6px; }
  #files .ft-file.ft-released { opacity:.6; }
  .twrap { max-width:840px; margin:0 auto; }
  .tsum { color:var(--muted); font-size:12px; margin:0 0 14px; text-align:center; letter-spacing:.3px; }
  .tqueen { max-width:840px; margin:0 auto 16px; padding:13px 16px; background:linear-gradient(180deg,rgba(244,196,48,.12),var(--panel)); border:1px solid rgba(244,196,48,.5); border-radius:10px; display:flex; align-items:baseline; gap:10px; }
  .tqueen b { color:#f4c430; font-size:14px; }
  .thost { margin:0 0 14px; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .thosthd { padding:9px 14px; background:var(--sel); border-bottom:1px solid var(--line); font-family:ui-monospace,monospace; font-size:12.5px; color:var(--fg); }
  .tbee { display:flex; align-items:center; gap:9px; padding:7px 14px; border-bottom:1px solid var(--line); font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tbee:last-child { border-bottom:none; }
  .tdotr { width:9px; height:9px; border-radius:50%; flex:none; }
  .tbee b { flex:none; }
  .tmeta { color:var(--muted); font-size:11px; }
  .tmodel { color:var(--green); font-family:ui-monospace,monospace; font-size:11px; }
  .tjail { color:var(--amber); font-size:11px; font-weight:600; }
  .tnojail { color:var(--red); font-size:11px; }
  .tempty { color:var(--muted); font-style:italic; text-align:center; padding:30px; }
  .mc-wrap { max-width:840px; margin:16px auto 0; padding:0 0 18px; }
  .mc-hdr { color:#6b6452; font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin:0 0 7px; }
  .mc-table { width:100%; border-collapse:collapse; font-size:12px; }
  .mc-table th { color:var(--amber); font-weight:600; text-align:left; padding:3px 8px 3px 0;
    border-bottom:1px solid var(--line); font-size:11px; text-transform:uppercase; letter-spacing:.3px; }
  .mc-table td { color:var(--fg); padding:3px 8px 3px 0; border-bottom:1px solid rgba(255,255,255,.04); font-family:ui-monospace,monospace; font-size:11.5px; }
  .mc-table td:first-child { color:var(--green); }
  .mc-null { color:var(--muted); font-style:italic; }
  /* .proposal-card — same visual family as .tqueen (amber-tinted gradient card)
     but block layout (guidance text + actions need their own lines), and the
     accept/reject buttons reuse .preview's .acc/.chg color language. */
  .proposals-wrap { max-width:840px; margin:0 auto 20px; }
  .proposals-title { color:#f4c430; font-size:13px; font-weight:600; margin:0 0 8px; letter-spacing:.2px; }
  .proposal-card { padding:13px 16px; margin-bottom:10px; background:linear-gradient(180deg,rgba(244,196,48,.12),var(--panel)); border:1px solid rgba(244,196,48,.5); border-radius:10px; }
  .pr-hdr { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .pr-sig { color:var(--fg); font-size:13.5px; font-weight:600; font-family:ui-monospace,monospace; }
  .pr-count { background:#f4c430; color:var(--bg); font-size:11px; font-weight:700; padding:1px 8px; border-radius:9px; flex:none; }
  .pr-guidance { color:var(--muted); font-size:12.5px; margin:2px 0 8px; }
  .pr-skill { display:inline-block; background:rgba(79,195,217,.15); border:1px solid #4fc3d9; color:#4fc3d9; font-size:11px; padding:2px 9px; border-radius:9px; margin-bottom:9px; font-family:ui-monospace,monospace; }
  .pr-actions button { border:none; border-radius:5px; padding:4px 12px; font-size:12px; cursor:pointer; margin-right:8px; }
  .pr-actions .acc { background:var(--green); color:var(--bg); }
  .pr-actions .chg { background:var(--panel); color:var(--fg); border:1px solid var(--line); }
  .pmission { max-width:800px; margin:0 auto 20px; padding:16px 18px; background:var(--panel); border:1px solid var(--line); border-radius:10px; }
  .phdr { display:flex; align-items:center; gap:10px; margin-bottom:3px; }
  .pdir { font-size:16px; font-weight:600; color:var(--fg); }
  .ppill { font-size:10px; text-transform:uppercase; letter-spacing:.5px; padding:2px 8px; border-radius:10px; flex:none; }
  .ppill.running { background:var(--amber); color:var(--bg); }
  .ppill.done { background:var(--green); color:var(--bg); }
  .ppill.review { background:#4fc3d9; color:var(--bg); }
  .psprint { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-left:auto; }
  .preview { margin:8px 0 2px; padding:8px 11px; background:rgba(79,195,217,.12); border:1px solid #4fc3d9; border-radius:7px; font-size:12.5px; color:var(--fg); }
  .preview button { border:none; border-radius:5px; padding:4px 12px; font-size:12px; cursor:pointer; margin-left:8px; }
  .preview .acc { background:var(--green); color:var(--bg); }
  .preview .chg { background:var(--panel); color:var(--fg); border:1px solid var(--line); }
  .psum { color:var(--muted); font-size:12px; margin-bottom:10px; }
  .pstep { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:13px; border-top:1px solid rgba(127,127,127,.08); }
  .pstatus { min-width:80px; color:var(--muted); font-size:10.5px; text-transform:uppercase; letter-spacing:.3px; }
  .prole { color:var(--muted); font-size:12px; }
  .prepl { color:var(--amber); font-size:12px; }
  .pfind { margin-top:10px; display:flex; flex-direction:column; gap:3px; padding-top:8px; border-top:1px solid var(--line); }
  .pfrow { font-size:12px; }
  .pmt { text-align:center; color:var(--muted); margin-top:64px; font-size:13px; }
  #c { flex:1 1 auto; min-height:0; width:100%; display:block; }
  #empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--stage-muted); z-index:1; pointer-events:none; }
  #tabs { pointer-events:auto; margin-left:8px; }
  .tab { cursor:pointer; color:var(--muted); padding:3px 9px; border-radius:5px; font-size:13px; }
  .tab.active { color:var(--bg); background:var(--amber); }
  .tab:hover:not(.active) { color:var(--fg); }
  #memory { position:fixed; inset:42px 0 0 0; z-index:3; display:none; background:var(--bg); }
  #memory.show { display:block; }
  #proposals { position:fixed; inset:42px 0 0 0; z-index:3; display:none; background:var(--bg); overflow:auto; padding:22px 0; }
  #proposals.show { display:block; }
  .proposals-explainer { max-width:840px; margin:0 auto 16px; padding:11px 15px; background:var(--panel);
    border:1px solid var(--line); border-radius:8px; color:var(--muted); font-size:12.5px; line-height:1.5; }
  .pbadge { display:inline-block; background:#f4c430; color:#15110a; font-size:10px; font-weight:700;
    padding:0 6px; border-radius:9px; margin-left:5px; vertical-align:middle; line-height:15px; min-width:8px; text-align:center; }
  @keyframes pbadge-pulse { 0%{ transform:scale(1); } 35%{ transform:scale(1.55); box-shadow:0 0 0 4px rgba(244,196,48,.35); } 100%{ transform:scale(1); } }
  .pbadge.pulse { animation:pbadge-pulse .6s ease-out; }
  /* #completed — the Completed tab: same fixed-overlay family as #proposals/
     #progress, .cm- cards mirror .pmission, and #completed-detail mirrors
     .pmission for the drill-down pane opened by openMissionDetail(). */
  #completed { position:fixed; inset:42px 0 0 0; z-index:3; display:none; background:var(--bg); overflow:auto; padding:22px 0; }
  #completed.show { display:block; }
  .cm-card { max-width:800px; margin:0 auto 14px; padding:14px 18px; background:var(--panel); border:1px solid var(--line); border-radius:10px; cursor:pointer; }
  .cm-hdr { display:flex; align-items:center; gap:10px; margin-bottom:3px; }
  .cm-dir { font-size:15px; font-weight:600; color:var(--fg); }
  .cm-pill { font-size:10px; text-transform:uppercase; letter-spacing:.5px; padding:2px 8px; border-radius:10px; flex:none; background:var(--green); color:var(--bg); }
  .cm-sum { color:var(--muted); font-size:12px; margin:2px 0 4px; }
  .cm-learned { font-size:11.5px; color:#4fc3d9; margin-top:4px; }
  .cm-actions { margin-top:9px; }
  .cm-actions button { border:none; border-radius:5px; padding:4px 12px; font-size:12px; margin-right:8px; }
  .cm-actions .cm-details-btn { background:var(--panel); color:var(--fg); border:1px solid var(--line); cursor:pointer; }
  #completed-detail { max-width:800px; margin:0 auto 20px; padding:16px 18px; background:var(--panel); border:1px solid var(--line); border-radius:10px; }
  /* #skills — the Skills tab: fleet-wide shared skills (kind='skill' in the
     artifact store), same fixed-overlay + card family as #proposals/#completed.
     "We share skills, not just memories" made visible: this is the whole
     fleet's canonical set, not one agent's — see the honest-limit note on
     the inspector's ".isk" section below. */
  #skills { position:fixed; inset:42px 0 0 0; z-index:3; display:none; background:var(--bg); overflow:auto; padding:22px 0; }
  #skills.show { display:block; }
  .skills-explainer { max-width:840px; margin:0 auto 16px; padding:11px 15px; background:var(--panel);

  /* #replay — the player's control bar. Unlike #completed/#progress (full-

  #modalcard .body .wl { color:var(--amber); cursor:pointer; border-bottom:1px dotted var(--amber); }
  /* ---- floating agent windows ---- */
  #windows { position:fixed; inset:0; z-index:8; pointer-events:none; }

<body>
  <!-- COCKPIT-SHELL:HUD:BEGIN -->
  <div id="hud">
  <b>CorralAI</b><span class="sub" id="skinsub">— the corral</span>

  <a class="tab" id="tab-progress" onclick="setView('progress')">progress</a>
  <a class="tab" id="tab-topology" onclick="setView('topology')">topology</a>
  <a class="tab" id="tab-memory" onclick="setView('memory')">memory</a>
  <a class="tab" id="tab-skills" onclick="setView('skills')">skills</a>
  <a class="tab" id="tab-proposals" onclick="setView('proposals')">proposals<span id="proposals-badge" class="pbadge" style="display:none"></span></a>
  <a class="tab" id="tab-files" onclick="setView('files')">files</a>

  <span class="stat" id="whoami" title="who the brain sees you as"></span>
  <select id="skinsel" onchange="setSkin(this.value)" title="critter skin" style="pointer-events:auto;margin-left:8px;background:var(--panel);color:var(--fg);border:1px solid var(--line);border-radius:6px;font-size:11px;padding:2px 4px"></select>
  <button type="button" class="tab" id="themebtn" onclick="toggleTheme()" title="toggle light / dark" aria-label="Switch to light theme" style="pointer-events:auto;margin-left:6px;background:none;border:none;font:inherit">☾</button>

  <!-- COCKPIT-SHELL:HUD:END -->
  <div id="stage">
    <aside id="leftcol">
      <!-- COCKPIT-SHELL:TASKS:BEGIN -->

      <!-- COCKPIT-SHELL:TASKS:END -->
    </aside>

        <span class="dot" style="background:#e6c84f"></span>researcher
        <span class="dot" style="background:#4fc3d9"></span>designer

        <span class="dot" style="background:#5ec98a"></span>tester
        <span class="dot" style="background:#e0913a"></span>pentester
        <span class="dot" style="background:#d96fb0"></span>perf

    <aside id="rightcol">

      <!-- COCKPIT-SHELL:AGENTS:END -->
      <div id="inspector"></div>

      <!-- COCKPIT-SHELL:FINDINGS:BEGIN -->

      <input type="range" id="replay-scrub" min="0" max="0" value="0" oninput="seekReplay(+this.value)">
      <span id="replay-label">0 / 0</span>
      <!-- Playback speed lives in the top HUD now (#hud-speed, shown while replaying). -->

        <input id="mq" placeholder="search the corpus…" oninput="debounceSearch()" autocomplete="off">

  <div id="modal" onclick="if(event.target.id==='modal')closeModal()">
    <div id="modalcard"><span class="mclose" onclick="closeModal()">✕</span><div id="modalbody"></div></div>
  </div>
<script src="/replay-player.js"></script>
<script>
function apply(state){
  lastState = state;
  serverNow = state.server_now || 0;
  parkedGrace = state.parked_grace_seconds || 300;
  stateClientT = performance.now()/1000;
  const seen = new Set();
  links.length = 0;
  const claimsByPath = {};
  (state.live_claims||[]).forEach(c => { (claimsByPath[c.path] = claimsByPath[c.path]||new Set()).add(c.agent); });

  (state.active_agents||[]).forEach(a => {
    const leaf = a.parent ? (a.name.split('/').pop()||a.name) : a.name;
    const n = ensure('a:'+a.name,'agent',leaf);
    n.last = a.last_active_ts||0; n.parent = a.parent||''; n.role = a.role||''; n.fullname = a.name;
    n.status = a.status||'working'; n.statusSince = a.status_since||0;
    seen.add(n.id);
  });
  // Subagent tree: edge parent -> child (keep the parent node alive while it has kids).
  (state.active_agents||[]).forEach(a => {
    if(!a.parent) return;
    const child = nodes.get('a:'+a.name);
    const par = ensure('a:'+a.parent,'agent', a.parent.split('/').pop()||a.parent); seen.add(par.id);
    if(child) links.push({a:par, b:child, sub:true});
  });
  const agentStatus = {};
  (state.active_agents||[]).forEach(a => { agentStatus[a.name] = {status:a.status||'working', since:a.status_since||0}; });
  for(const n of nodes.values()) if(n.kind==='path') n.claimLast = 0;
  (state.live_claims||[]).forEach(c => {
    const an = ensure('a:'+c.agent,'agent',c.agent); seen.add(an.id);
    const short = c.path.split('/').filter(Boolean).pop() || c.path;
    const pn = ensure('p:'+c.path,'path',short);
    pn.fullpath = c.path;
    pn.conflict = claimsByPath[c.path].size > 1; seen.add(pn.id);
    pn.claimLast = Math.max(pn.claimLast||0, an.last||0);
    const holder = agentStatus[c.agent] || {status:'working', since:0};
    const parked = c.exclusive && holder.status === 'awaiting_approval';
    links.push({a:an, b:pn, conflict:pn.conflict, parked: parked, since: holder.since});
  });
  for(const id of [...nodes.keys()]) if(!seen.has(id)) nodes.delete(id);
  if(selected && !nodes.has(selected.id)) selected = null;
  if(selected && selected.kind!=='agent') renderInspector();  // file/path nodes only; agents use windows

  const stat = document.getElementById('stat');
  const parkedN = (state.active_agents||[]).filter(a => a.status === 'awaiting_approval').length;
  stat.textContent = `${(state.active_agents||[]).length} agents · ${(state.live_claims||[]).length} claims` + (parkedN?` · ${parkedN} ⏸`:'');
  document.getElementById('empty').style.display = nodes.size ? 'none' : 'flex';
  // AGENTS roster — a stable, CLICKABLE list of every bee (the bees buzz around the
  // canvas, so this is the reliable way to open a bee's detail). Each row shows the
  // bee, its role, and what it's doing right now; click to inspect.
  const feed = document.getElementById('agents');
  const latest = {};   // newest tool-call / command per agent → the "doing now" column
  (state.recent_activity||[]).forEach(a => { if(a.agent && !latest[a.agent]) latest[a.agent] = '→ '+(a.tool||''); });
  (state.recent_executions||[]).forEach(e => { if(e.agent && !latest[e.agent]) latest[e.agent] = '❯ '+((e.command||'').slice(0,20)); });
  const sOrder = {working:0, awaiting_approval:1, idle:2};
  const ags = (state.active_agents||[]).slice().sort((a,b)=>((sOrder[a.status]??3)-(sOrder[b.status]??3)) || ((a.name||'')>(b.name||'')?1:-1));
  feed.innerHTML = '<div class="feedhdr">agents · ' + ags.length + '</div>' +
    (ags.length ? ags.map(a => {
      const leaf = a.parent ? (a.name.split('/').pop()||a.name) : a.name;
      const work = a.status==='working';
      const dot = work ? roleColor(a.role) : (a.status==='awaiting_approval' ? 'var(--amber)' : '#5b5750');
      const doing = work ? (latest[a.name]||'…') : (a.status==='awaiting_approval' ? '⏸ awaiting approval' : 'idle');
      const sel = agentWindows.has(a.name) ? ' arowsel' : '';  // highlight agents with open windows
      return `<div class="arow${sel}" onclick="selectAgent('${(a.name||'').replace(/'/g,"\\'")}')" title="open ${esc(displayName(a.name))} detail">`
        + `<span class="adot" style="background:${dot}"></span>`
        + `<b style="color:${roleColor(a.role)}">${esc(displayName(leaf))}</b> <span class="ameta">${esc(a.role||'')}</span>`
        + `<span class="adoing">${esc(doing)}</span></div>`;
    }).join('') : '<div class="row" style="opacity:.6">no agents yet…</div>');
  // Bob the Builder says "Yes we can…" the moment he finishes a task
  (lastState.tasks||[]).forEach(t=>{
    if(t.status==='done' && t.claimed_by==='Bob' && !bobDone.has(t.id)){
      bobDone.add(t.id);
      if(bobSeeded){ const bn=nodes.get('a:Bob'); if(bn) buzzes.push({x:bn.x+8, y:bn.y-14, t0:Date.now()/1000, txt:'Yes we can…', say:true, role:'builder', life:3.2}); }
    }
  });
  // the verify gate caught a bee narrating "done" with no real run on record: the
  // bee that claimed the target task owns up (the finding is the source of truth).
  const tByKey = {}; (lastState.tasks||[]).forEach(t=>{ if(t.key) tByKey[t.key]=t; });
  (lastState.findings||[]).forEach(f=>{
    if(f.reporter!=='verify-gate' || caughtFindings.has(f.id)) return;
    caughtFindings.add(f.id);
    if(!bobSeeded) return;                                  // skip the backlog on first load
    const t = tByKey[f.target]; const bee = t && t.claimed_by; if(!bee) return;
    const bn = nodes.get('a:'+bee); if(!bn) return;
    const m = /'([^']+)'/.exec(f.evidence||''); const cmd = m ? m[1] : 'a real run';
    const line = skin().caught[(Math.random()*skin().caught.length)|0].replace('{cmd}', cmd);
    buzzes.push({x:bn.x+8, y:bn.y-14, t0:Date.now()/1000, txt:line, say:true, role:t.role||'builder', life:3.6, caught:true});
  });
  bobSeeded = true;
  renderTasks();
  renderFindings();
  renderExec();
  renderLaunchTab();
  renderProgress();
  renderTopology();
  renderProposalsTab();
  // Tick-update open agent windows — patch .aw-body only; ask footer is never touched here
  agentWindows.forEach((_, name) => renderAgentWindowBody(name));
}

// renderTopology: the ecosystem map — the brain at the hub, then every HOST and the
// bees it runs, each with the model driving it and the jail confining its commands.
// Fed by report_host (live, with stale eviction), so it shows the real distributed
// shape of the swarm rather than a diagram.
function renderTopology(){
  const el = document.getElementById('topology');
  if(!el) return;
  const hosts = (lastState && lastState.topology) || [];
  const byHost = {};
  hosts.forEach(h => { const k=h.host||'?'; (byHost[k]=byHost[k]||[]).push(h); });
  const hostKeys = Object.keys(byHost).sort();
  const models = [...new Set(hosts.map(h=>h.backend+':'+h.model))];
  let html = '<div class="twrap">';
  html += `<div class="tsum">${hosts.length} agent${hosts.length===1?'':'s'} · ${hostKeys.length} host${hostKeys.length===1?'':'s'}${models.length?' · '+esc(models.join(' , ')):''}</div>`;
  // The topology pane's flavored copy (brain name, worker nouns) follows the
  // active skin — per the standing rule, no skin's vocabulary is hardcoded.
  html += `<div class="tqueen"><b>${skin().brain||'👑'} ${esc(skin().tab)} brain</b> <span class="tmeta">${skin().brainTag}</span></div>`;
  if(!hosts.length){ el.innerHTML = html + `<div class="tempty">no agents have announced yet — the ${esc(skin().nouns)} report their host on a timer…</div></div>` + renderModelComparison(); return; }
  for(const host of hostKeys){
    const bees = byHost[host], os = bees[0].os||'';
    const nWorkers = bees.length===1 ? `1 ${esc(skin().noun)}` : `${bees.length} ${esc(skin().nouns)}`;
    const localAgentsSet = new Set();
    bees.forEach(b => {
      if(b.local_agents){
        b.local_agents.forEach(la => localAgentsSet.add(la));
      }
    });
    const localAgentsList = [...localAgentsSet].sort();
    const localAgentsStr = localAgentsList.length ? ` · Installed agents: ${localAgentsList.join(', ')}` : '';
    html += `<div class="thost"><div class="thosthd">🖥 ${esc(host)} <span class="tmeta">${esc(os)} · ${nWorkers}${esc(localAgentsStr)}</span></div>`;
    html += bees.map(b => {
      const jail = (b.jail && b.jail!=='none')
        ? `<span class="tjail">⛨ ${esc(b.jail)}${b.net?' +net':' ·no-net'}</span>`
        : `<span class="tnojail">⚠ no jail</span>`;
      const drift = b.drift ? ` <span style="color:var(--amber)">⚠ expected ${esc(b.expected||'?')}</span>` : '';
      return `<div class="tbee"><span class="tdotr" style="background:${roleColor(b.role)}"></span>`
        + `<b style="color:${roleColor(b.role)}">${esc(displayName(b.agent))}</b> <span class="tmeta">${esc(b.role||'')}</span>`
        + ` <span class="tmodel">${esc(b.backend||'')}:${esc(b.model||'')}</span>${drift} ${jail}`
        + ` <span class="tmeta">pid ${b.pid||'?'}</span></div>`;
    }).join('');
    html += '</div>';
  }
  el.innerHTML = html + '</div>' + renderModelComparison();
}

function renderModelComparison(){
  const mc = lastState && lastState.model_comparison;
  if(!mc || !mc.rows || !mc.rows.length) return '';
  // columns: model,findings,critical,high,medium,low,addressed,dismissed,open,confirm_pct
  const rows = mc.rows.map(r => {
    const confirmVal = r[9]==null ? '<span class="mc-null">—</span>' : r[9]+'%';
    return `<tr><td>${esc(String(r[0]))}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td>`
      + `<td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td><td>${r[8]}</td><td>${confirmVal}</td></tr>`;
  }).join('');
  return `<div class="mc-wrap"><div class="mc-hdr">Model comparison</div>`
    + `<table class="mc-table"><thead><tr>`
    + `<th>model</th><th>findings</th><th>crit</th><th>high</th><th>med</th><th>low</th>`
    + `<th>addressed</th><th>dismissed</th><th>open</th><th>confirm%</th>`
    + `</tr></thead><tbody>${rows}</tbody></table></div>`;
}

// renderProgress: the Progress tab — each mission as the plan the brain laid out,
// its steps (status, assignee, supersession lineage), and its findings, live. The
// synthesis view: you watch the directive fill in, bees claim steps, findings
// appear, and the reflex/lead re-planning rewrite the plan in real time.
// renderProposals: the learning loop's human gate, made visible — pending
// proposals the herd's sweep clustered from findings/lessons, rendered in
// their OWN tab (moved off Progress in the 9+-proposals feedback: they were
// crowding the mission review bar below the fold). Approve fans the
// proposal's guidance/skill out into standing memory + the fleet artifact
// store (POST /api/proposal/approve); reject dismisses it, suppressing the
// signature until the evidence doubles (POST /api/proposal/reject). Same
// .tqueen-card family styling as the topology header and mission review bar.
function renderProposals(){
  const ps = (lastState && lastState.proposals) || [];
  if(!ps.length) return '';
  const cards = ps.map(p => {
    const skillChip = p.skill_name ? `<div class="pr-skill">🛠 ${esc(p.skill_name)}</div>` : '';
    return `<div class="proposal-card">`
      + `<div class="pr-hdr"><span class="pr-sig">${esc(p.signature)}</span><span class="pr-count">${p.count}</span></div>`
      + `<div class="pr-guidance">${esc(p.guidance || '(no guidance drafted yet)')}</div>`
      + skillChip
      + `<div class="pr-actions"><button class="acc" onclick="approveProposal(${p.id})">approve</button>`
      + `<button class="chg" onclick="rejectProposal(${p.id})">reject</button></div>`
      + `</div>`;
  }).join('');
  return `<div class="proposals-wrap"><div class="proposals-title">${esc(skin().proposes)}</div>${cards}</div>`;
}
// proposalsExplainer: short, skin-flavored copy at the top of the tab — what a
// proposal IS (recurring evidence the herd distilled), and what approving it
// does (promotes guidance into vetted memory + syncs the skill fleet-wide).
// The human gate of the learning loop, spelled out once instead of implied.
function proposalsExplainer(){
  const s = skin();
  const who = s.tab || 'corral';
  const one = s.noun || 'agent';   // the skin's worker noun — hive alone gets the bee word
  return `<div class="proposals-explainer">Proposals are recurring patterns the ${esc(who)} distilled from real findings and lessons — not one ${esc(one)}'s opinion, but evidence that showed up again and again. `
    + `Approving one promotes its guidance into vetted memory and syncs the matching skill across the whole fleet; rejecting it sends the pattern back until the evidence doubles. This is the human gate of the learning loop.</div>`;
}
// renderProposalsTab: the proposals tab's full pane (explainer + cards), and the
// live badge on the tab label itself — the count updates every /api/state tick
// (apply() below), and a short pulse animation fires on the badge when the
// pending count RISES, so an approval/landing lands visibly even from another tab.
let lastProposalCount = -1;
function renderProposalsTab(){
  const el = document.getElementById('proposals');
  if(el) el.innerHTML = proposalsExplainer() + (renderProposals() || '<div class="pmt">no pending proposals right now — the herd is still gathering evidence.</div>');
  const ps = (lastState && lastState.proposals) || [];
  const n = ps.length;
  const badge = document.getElementById('proposals-badge');
  if(badge){
    if(n > 0){
      badge.textContent = n > 99 ? '99+' : String(n);
      badge.style.display = 'inline-block';
      if(lastProposalCount >= 0 && n > lastProposalCount){
        badge.classList.remove('pulse'); void badge.offsetWidth; badge.classList.add('pulse');
      }
    } else {
      badge.style.display = 'none';
    }
  }
  lastProposalCount = n;
}
function approveProposal(id){
  fetch('/api/proposal/approve', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id})})
    .then(r => { if(!r.ok) return r.text().then(t => alert('approve failed: ' + t)); });
}
function rejectProposal(id){
  const reason = prompt('Why reject this proposal? (optional)') || '';
  fetch('/api/proposal/reject', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({id, reason})})
    .then(r => { if(!r.ok) return r.text().then(t => alert('reject failed: ' + t)); });
}

// renderSkillsTab: the fleet's shared skills — "we share skills, not just
// memories" made visible. Fetches /api/skills (kind='skill' rows in the
// artifact store, the same store `corral sync` reads/writes) and lists each
// as name + path + one-line description. This is the WHOLE FLEET's canonical
// set (what every synced member CAN use), not any one agent's — same honest
// scope as the fleet-skills section in the agent inspector below.
function renderSkillsTab(){
  const el = document.getElementById('skills');
  if(!el) return;
  fetch('/api/skills').then(r=>r.json()).then(d=>{
    const skills = d.skills || [];
    const explainer = `<div class="skills-explainer">Skills the fleet shares — synced by every member via <code>corral sync</code>, versioned in the brain so a change to one propagates to all. This is the canonical set available fleet-wide, not any one agent's private equip list.</div>`;
    if(!skills.length){ el.innerHTML = explainer + '<div class="pmt">no shared skills yet — publish one with `corral sync` to seed the fleet.</div>'; return; }
    const cards = skills.map(sk => `
      <div class="sk-card">
        <span class="sk-name">${esc(sk.name)}</span><span class="sk-path">${esc(sk.path)}</span>
        ${sk.description ? `<div class="sk-desc">${esc(sk.description)}</div>` : ''}
      </div>`).join('');
    el.innerHTML = explainer + cards;
  }).catch(()=>{ el.innerHTML = '<div class="pmt">could not load the fleet\'s skills.</div>'; });
}

// ---- Lookbook Functions ----
let lbUploadedBase64 = "", lbUploadedMime = "";

function renderLookbookTab() {
  const el = document.getElementById('lookbook');
  if (!el) return;

  el.innerHTML = `
    <div class="lb-container">
      <div class="lb-sidebar">
        <h2>Emulation Lookbook</h2>
        <p>Upload screenshot references of UI styling or component looks you want the swarm agents to emulate.</p>
        
        <div class="lb-field">
          <label for="lb-name">Design Name</label>
          <input type="text" id="lb-name" placeholder="e.g. Sleek Glassmorphic Form" required>
        </div>

        <div class="lb-field">
          <label for="lb-desc">Emulation Guidelines</label>
          <textarea id="lb-desc" placeholder="Instructions/properties: e.g. dark background with glow, HSL colors, container border-radius 12px, backdrop-filter..." required></textarea>
        </div>

        <div class="lb-field">
          <label>Mockup Image</label>
          <label class="lb-file-drop" for="lb-file-input">
            <span class="icon">📁</span>
            <span>Click or Drag & Drop Image</span>
            <input type="file" id="lb-file-input" accept="image/png, image/jpeg, image/webp, image/gif" style="display:none" onchange="previewLookbookUpload(event)">
          </label>
          <img id="lb-preview-img" class="lb-preview" alt="Upload preview">
        </div>

        <button class="lb-btn" onclick="uploadLookbookItem()">Add to Lookbook</button>
      </div>

      <div class="lb-main">
        <div class="lb-main-hdr">
          <div class="lb-main-title">Reference UI Designs</div>
        </div>
        <div class="lb-gallery" id="lb-gallery-container">
          <div class="pmt">Loading lookbook...</div>
        </div>
      </div>
    </div>

    <!-- Full Image Zoom Overlay Modal -->
    <div class="lb-modal" id="lb-zoom-modal" onclick="this.classList.remove('show')">
      <img class="lb-modal-img" id="lb-zoom-img" alt="Zoomed reference design">
    </div>
  `;

  loadLookbookItems();
}

function previewLookbookUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    const dataUrl = evt.target.result;
    const commaIdx = dataUrl.indexOf(',');
    lbUploadedBase64 = dataUrl.substring(commaIdx + 1);
    lbUploadedMime = file.type;

    const preview = document.getElementById('lb-preview-img');
    if (preview) {
      preview.src = dataUrl;
      preview.style.display = 'block';
    }
  };
  reader.readAsDataURL(file);
}

function uploadLookbookItem() {
  const nameInput = document.getElementById('lb-name');
  const descInput = document.getElementById('lb-desc');
  if (!nameInput || !descInput) return;

  const name = nameInput.value.trim();
  const desc = descInput.value.trim();

  if (!name || !desc) {
    alert("Please enter both a Design Name and Emulation Guidelines.");
    return;
  }
  if (!lbUploadedBase64) {
    alert("Please select or drop a mockup image to emulate.");
    return;
  }

  fetch('/api/lookbook/upload', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      name: name,
      description: desc,
      mime_type: lbUploadedMime,
      data: lbUploadedBase64
    })
  }).then(r => {
    if (!r.ok) return r.text().then(t => { throw new Error(t) });
    return r.json();
  }).then(() => {
    // Reset form fields
    nameInput.value = "";
    descInput.value = "";
    lbUploadedBase64 = "";
    lbUploadedMime = "";
    const preview = document.getElementById('lb-preview-img');
    if (preview) preview.style.display = 'none';
    const fileInput = document.getElementById('lb-file-input');
    if (fileInput) fileInput.value = "";

    loadLookbookItems();
  }).catch(err => {
    alert("Failed to upload: " + err.message);
  });
}

function loadLookbookItems() {
  const container = document.getElementById('lb-gallery-container');
  if (!container) return;

  fetch('/api/lookbook')
    .then(r => r.json())
    .then(items => {
      if (!items || items.length === 0) {
        container.innerHTML = '<div class="pmt" style="grid-column: 1/-1;">No reference designs in your Lookbook yet. Upload one on the left!</div>';
        return;
      }

      container.innerHTML = items.map(item => `
        <div class="lb-card">
          <div class="lb-card-thumb-wrap" onclick="zoomLookbook(${item.id})">
            <img class="lb-card-thumb" src="/api/lookbook/image?id=${item.id}" alt="\${esc(item.name)}">
          </div>
          <div class="lb-card-body">
            <h3 class="lb-card-title">\${esc(item.name)}</h3>
            <p class="lb-card-desc">\${esc(item.description)}</p>
            <div class="lb-card-actions">
              <button class="lb-card-btn" onclick="copyLookbookGuidelines(\\\`\${esc(item.description).replace(/\`/g, '\\\\`').replace(/\\$/g, '\\\\$')}\\\`)">
                📋 Copy Prompt
              </button>
              <button class="lb-card-btn delete" onclick="deleteLookbookItem(\${item.id})">
                🗑 Delete
              </button>
            </div>
          </div>
        </div>
      `).join('');
    })
    .catch(() => {
      container.innerHTML = '<div class="pmt" style="grid-column: 1/-1;">Could not load lookbook items.</div>';
    });
}

function zoomLookbook(id) {
  const modal = document.getElementById('lb-zoom-modal');
  const img = document.getElementById('lb-zoom-img');
  if (modal && img) {
    img.src = '/api/lookbook/image?id=' + id;
    modal.classList.add('show');
  }
}

function deleteLookbookItem(id) {
  if (!confirm("Are you sure you want to delete this lookbook design item?")) return;
  fetch('/api/lookbook/delete?id=' + id, { method: 'POST' })
    .then(r => {
      if (!r.ok) throw new Error("delete failed");
      loadLookbookItems();
    })
    .catch(err => {
      alert("Failed to delete: " + err.message);
    });
}

function copyLookbookGuidelines(text) {
  navigator.clipboard.writeText("Please emulate the following design style when building this task:\\n" + text)
    .then(() => {

    })

}

// fmtDuration: seconds -> "Xm Ys" for the Completed tab's card + detail pane.

}

// openMissionDetail: the drill-down pane — phase/task table (with timings),
// findings (with resolved_ts-aware outcomes), an executions summary, the
// what-got-learned chips, and the PR link when the mission landed one.
function openMissionDetail(id){
  const el = document.getElementById('completed-detail');
  if(!el) return;
  fetch('/api/history/'+id).then(r=>{
    if(!r.ok) throw new Error('not found');
    return r.json();
  }).then(d=>{
    const mv = d.mission;
    const phases = mv.phases || [];
    const tasks = mv.tasks || [];
    const findings = mv.findings || [];
    const execs = mv.executions || [];
    // Group tasks by t.title against p.name — planToTasks stamps the phase
    // name on every task's Title exactly so views can regroup this way
    // (mirrors mission.Store.View). Role would double-count: DefaultPlan
    // gives build-core and build the same "builder" role.
    const tasksByPhase = {};
    tasks.forEach(t => { (tasksByPhase[t.title] = tasksByPhase[t.title] || []).push(t); });
    const phaseRows = phases.length ? phases.map(p => {
      const ts = tasksByPhase[p.name] || [];
      const durs = ts.filter(t=>t.done_ts && t.claimed_ts).map(t=>t.done_ts - t.claimed_ts);
      const totalDur = durs.reduce((a,b)=>a+b, 0);
      return `<tr><td>${esc(p.name)}</td><td>${esc(p.status)}</td><td>${p.done_tasks}/${p.count}</td><td>${durs.length ? fmtDuration(totalDur) : '<span class="cmd-null">—</span>'}</td></tr>`;
    }).join('') : `<tr><td colspan="4" class="cmd-null">no phases recorded</td></tr>`;
    const findingRows = findings.length ? findings.map(f => {
      const outcome = f.resolved_ts ? `${esc(f.status)} @ ${new Date(f.resolved_ts*1000).toLocaleString()}` : esc(f.status);
      return `<tr><td>${esc(f.type)}</td><td>${esc(f.target||'')}</td><td>${esc(f.severity)}</td><td>${outcome}</td></tr>`;
    }).join('') : `<tr><td colspan="4" class="cmd-null">no findings</td></tr>`;
    const execOk = execs.filter(e=>e.ok).length;
    const execSummary = execs.length ? `${execOk}/${execs.length} passed` : 'no executions recorded';
    const learned = (mv.learned_signatures||[]).length
      ? `<div class="cm-learned">what got learned: ${(mv.learned_signatures||[]).map(esc).join(', ')}</div>`
      : `<div class="cmd-null">nothing promoted from this mission (yet)</div>`;
    const pr = mv.pr_url ? `<div style="margin-top:8px"><a href="${esc(mv.pr_url)}" target="_blank" rel="noopener">pull request ↗</a></div>` : '';
    el.innerHTML = `
      <span class="cmd-close" onclick="closeMissionDetail()">✕ close</span>
      <div class="cm-hdr"><span class="cm-dir">${esc(mv.directive)}</span><span class="cm-pill">${esc(mv.status)}</span></div>
      <div class="cm-sum">${fmtDuration(mv.duration_seconds)} · ${mv.done_task_count}/${mv.task_count} tasks · ${mv.finding_count} finding${mv.finding_count===1?'':'s'}</div>
      <div class="cmd-section-title">phases &amp; tasks</div>
      <table class="cmd-table"><thead><tr><th>phase</th><th>status</th><th>done</th><th>time</th></tr></thead><tbody>${phaseRows}</tbody></table>
      <div class="cmd-section-title">findings</div>
      <table class="cmd-table"><thead><tr><th>type</th><th>target</th><th>severity</th><th>outcome</th></tr></thead><tbody>${findingRows}</tbody></table>
      <div class="cmd-section-title">executions</div>
      <div class="cm-sum">${esc(execSummary)}</div>
      <div class="cmd-section-title">learning</div>
      ${learned}
      ${pr}
      <div class="cm-actions"><button class="cm-details-btn" title="replay this mission's build" onclick="openReplay(${mv.id});">▶ replay</button></div>`;
    el.style.display = 'block';
    el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }).catch(()=>{ el.innerHTML = '<div class="pmt">mission not found.</div>'; el.style.display = 'block'; });
}

function renderProgress(){
  const el = document.getElementById('progress');
  const missions = lastState.missions || [];
  if(!missions.length){ el.innerHTML = '<div class="pmt">no active missions running in the corral.</div>'; return; }
  const tasks = lastState.tasks || [], findings = lastState.findings || [];
  const tByM = {}, fByM = {}, replacedBy = {};
  tasks.forEach(t => { (tByM[t.mission_id] = tByM[t.mission_id] || []).push(t); if(t.supersedes) replacedBy[t.supersedes] = t; });
  findings.forEach(f => { (fByM[f.mission_id] = fByM[f.mission_id] || []).push(f); });
  const order = {claimed:0, ready:1, pending:2, done:3, superseded:4, cancelled:5};
  const missionsHtml = missions.map(m => {
    const ts = (tByM[m.id] || []).slice().sort((a,b)=>(order[a.status]??9)-(order[b.status]??9));
    const fs = (fByM[m.id] || []);
    const done = ts.filter(t=>t.status==='done').length;
    const sup = ts.filter(t=>t.status==='superseded').length;
    const openF = fs.filter(f=>f.status==='open').length;
    const pillClass = m.status==='done'?'done':(m.status==='awaiting_review'?'review':'running');
    const pillText = m.status==='awaiting_review'?'review':m.status;
    const sprintBadge = (m.sprint>1) ? `<span class="psprint">sprint ${m.sprint}</span>` : '';
    const reviewBar = (m.status==='awaiting_review')
      ? `<div class="preview">awaiting your review<button class="acc" onclick="reviewMission(${m.id},true)">accept</button><button class="chg" onclick="reviewMission(${m.id},false)">request changes</button></div>`
      : '';
    const summary = `${fmtDuration(m.duration_seconds)} · ${done}/${ts.length} tasks`
      + (sup ? ` (${sup} superseded)` : '')
      + (openF ? ` · ${openF} open finding${openF===1?'':'s'}` : '');
    const steps = ts.map(t => {
      const gone = (t.status==='cancelled' || t.status==='superseded');
      const who = (t.claimed_by && !gone) ? `<span style="color:${roleColor(t.role)}">← ${esc(t.claimed_by)}</span>` : '';
      const repl = (t.status==='superseded' && replacedBy[t.id]) ? `<span class="prepl">→ ${esc(replacedBy[t.id].key)}</span>` : '';
      const ttl = gone ? 'text-decoration:line-through;opacity:.55;color:var(--muted)' : 'color:var(--fg)';
      return `<div class="pstep"><span class="tdot" style="background:${taskColor(t.status)}"></span><span class="pstatus">${esc(t.status)}</span><b style="${ttl}">${esc(t.title||t.key)}</b> <span class="prole">${esc(t.role||'')}</span> ${who} ${repl}</div>`;
    }).join('');
    const frows = fs.length ? '<div class="pfind">' + fs.slice().sort((a,b)=>(SEV_RANK[b.severity]??0)-(SEV_RANK[a.severity]??0)).map(f =>
      `<span class="pfrow"><b style="color:${sevColor(f.severity)}">${esc(f.severity)} ${esc(f.type)}</b> <span style="color:var(--fg)">${esc(f.target||'')}</span> <span style="color:#6b6452">· ${esc(displayName(f.reporter))} · ${esc(f.status)}</span></span>`).join('') + '</div>' : '';
    return `<div class="pmission" onclick="openMissionDetail(${m.id})"><div class="phdr"><span class="ppill ${pillClass}">${esc(pillText)}</span><span class="pdir">${esc(m.directive)}</span>${sprintBadge}</div><div class="psum">${esc(summary)}</div>${reviewBar}<div class="psteps">${steps}</div>${frows}</div>`;
  }).join('');
  el.innerHTML = missionsHtml;
}

// renderExec: the LIVE EXECUTION FEED — the bees' REAL command runs, made
// visible. Newest on top: role-colored bee + the monospace command + an exit
// badge (✓ pass / ✗code fail / ⏱ timed out) + the muted result summary. The
// newest row flashes green on pass / red on fail so a fresh run catches the eye.
let lastExecKey = '';
let execFilter = '';   // when set, the live console isolates a single bee's lines
function setExecFilter(n){ execFilter = (execFilter === n ? '' : n); renderExec(); }
function execBadge(e){
  if(e.timed_out) return `<span class="xbadge" style="color:var(--amber)" title="timed out">⏱</span>`;
  if(e.ok)        return `<span class="xbadge" style="color:var(--green)" title="exit 0">✓</span>`;
  return `<span class="xbadge" style="color:var(--red)" title="exit ${e.exit_code}">✗${esc(String(e.exit_code))}</span>`;
}
function renderExec(){
  const ep = document.getElementById('exec');
  // TWO streams in one console: real command runs (recent_executions — exit-coded)
  // and every other bee tool-call (recent_activity — search_memory, write_file,
  // claim_paths, report_finding…). Merging them means the console is alive in EVERY
  // phase, not just the exec phases that run shell commands.
  const execs = ((lastState && lastState.recent_executions) || []).map(e => Object.assign({_k:'exec'}, e));
  const acts  = ((lastState && lastState.recent_activity)   || []).map(a => Object.assign({_k:'act'},  a));
  if(!execs.length && !acts.length){ ep.innerHTML = '<div class="feedhdr">live console · 0</div><div class="xempty">▌ '+skin().warming+'</div>'; lastExecKey=''; return; }
  // A fresh EXECUTION still fires the canvas ring-burst from the bee that ran it
  // (green pass / red fail / amber timeout) so the eye jumps canvas↔console.
  if(execs.length){
    const top=execs[0], key=(top.ts||0)+'|'+(top.agent||'')+'|'+(top.command||'');
    if(key!==lastExecKey){ lastExecKey=key; if(top.agent){ const an=nodes.get('a:'+top.agent);
      if(an) bursts.push({x:an.x, y:an.y, t0:Date.now()/1000, ok:!!top.ok, timed:!!top.timed_out}); } }
  }
  const everything = execs.concat(acts);
  // Filter chips — isolate one bee's stream. Bees are listed newest-active first so
  // the busy ones surface; if the filtered bee scrolled out of the ring, drop it.
  const bees = []; const seen = {};
  everything.sort((a,b)=>(b.ts||0)-(a.ts||0)).forEach(e => { if(e.agent && !seen[e.agent]){ seen[e.agent]=1; bees.push({name:e.agent, role:e.role}); } });
  if(execFilter && !seen[execFilter]) execFilter = '';   // the isolated bee aged out of the window
  const chip = (name, role, on) => `<span onclick="setExecFilter('${name.replace(/'/g,"\\'")}')" style="cursor:pointer;padding:1px 6px;margin-left:5px;border-radius:8px;font-size:10.5px;${on?`background:${role?roleColor(role):'#6b6452'};color:#15110a;font-weight:700`:`color:${role?roleColor(role):'var(--muted)'};border:1px solid ${hexA(role?roleColor(role):'#6b6452',.5)}`}">${esc(displayName(name))}</span>`;
  const allChip = `<span onclick="setExecFilter('')" style="cursor:pointer;padding:1px 6px;margin-left:8px;border-radius:8px;font-size:10.5px;${execFilter?'color:var(--muted);border:1px solid '+hexA('#6b6452',.5):'background:#6b6452;color:#15110a;font-weight:700'}">all</span>`;
  const chips = allChip + bees.map(b => chip(b.name, b.role, execFilter===b.name)).join('');
  // Terminal order: oldest at the top, newest at the BOTTOM, auto-scroll — a live
  // log of the hive (or the isolated bee) scrolling past as the work happens.
  const filtered = execFilter ? everything.filter(e => e.agent===execFilter) : everything;
  const merged = filtered.slice().sort((a,b)=>(a.ts||0)-(b.ts||0)).slice(-24);
  ep.innerHTML = '<div class="feedhdr">live console · ' + (execFilter ? esc(execFilter)+' · '+filtered.length : everything.length) + ' ' + chips + '</div>' +
    (merged.length ? '' : `<div class="xempty">▌ no recent lines from ${esc(execFilter)} — still working…</div>`) +
    merged.map(e => {
      if(e._k==='exec'){
        const out = (e.summary||'').split('\n').filter(Boolean).map(l=>`<div class="xout">${esc(l)}</div>`).join('');
        return `<div class="xblk"><div class="xcmdline"><span class="xprompt">❯</span> <b style="color:${roleColor(e.role)}">${esc(displayName(e.agent))}</b> <code class="xcmd">${esc(e.command||'')}</code> ${execBadge(e)}</div>${out}</div>`;
      }
      const d = (e.detail||'').replace(/^\{|\}$/g,''); const det = d.length>64 ? d.slice(0,63)+'…' : d;
      return `<div class="xblk"><div class="xcmdline"><span class="xprompt" style="color:#6b6452">→</span> <b style="color:${roleColor(e.role)}">${esc(displayName(e.agent))}</b> <span style="color:var(--amber)">${esc(e.tool||'')}</span> <code class="xcmd" style="color:var(--muted)">${esc(det)}</code></div></div>`;
    }).join('') + '<div class="xcursor">▌</div>';
  ep.scrollTop = ep.scrollHeight;   // keep the newest line in view, like a tailing log
}

// taskColor: pending grey, ready amber (waiting for a bee), claimed blue (a bee
// is on it), done green.
function taskColor(s){ return s==='done'?C.green:(s==='claimed'?'#5b9bd5':(s==='ready'?C.amber:'#6b6452')); }
// renderTasks: the live mission task list + which bee owns each task (the pull
// model, made watchable). Sorted so in-flight work is on top.
function renderTasks(){
  const tp = document.getElementById('tasks');
  const tasks = lastState.tasks || [];
  if(!tasks.length){ tp.innerHTML = ''; return; }
  const order = {claimed:0, ready:1, pending:2, done:3, superseded:4, cancelled:5};
  const counts = tasks.reduce((m,t)=>{ m[t.status]=(m[t.status]||0)+1; return m; }, {});
  // lineage: map a superseded task's id → the task that replaced it.
  const replacedBy = {};
  tasks.forEach(t => { if(t.supersedes) replacedBy[t.supersedes] = t; });
  const hdr = ['claimed','ready','done','superseded','cancelled'].filter(s=>counts[s]).map(s=>counts[s]+' '+s).join(' · ');
  tp.innerHTML = '<div class="feedhdr">tasks · ' + tasks.length + (hdr?' &nbsp; '+hdr:'') + '</div>' +
    tasks.slice().sort((a,b)=>(order[a.status]??9)-(order[b.status]??9)).slice(0,50).map(t => {
      const gone = (t.status==='cancelled' || t.status==='superseded');
      const who = t.claimed_by && !gone ? ` <span style="color:${roleColor(t.role)}">← ${esc(t.claimed_by)}</span>` : '';
      const repl = (t.status==='superseded' && replacedBy[t.id]) ? ` <span style="color:var(--amber)">→ ${esc(replacedBy[t.id].key)}</span>` : '';
      const titleStyle = gone ? 'color:var(--muted);text-decoration:line-through' : 'color:var(--fg)';
      return `<div class="trow"${gone?' style="opacity:.6"':''}><span class="tdot" style="background:${taskColor(t.status)}"></span><b style="${titleStyle}">${esc(t.title||t.key)}</b> <span style="color:var(--muted)">${esc(t.role||'')}</span>${who}${repl}</div>`;
    }).join('');
}

function debounceSearch(){ clearTimeout(_t); _t = setTimeout(searchMem, 220); }
async function searchMem(){
  const q = document.getElementById('mq').value, scope = document.getElementById('mscope').value;
  const res = document.getElementById('mresults');
  res.innerHTML = '<div class="mitem md">searching…</div>';
  try {
    const r = await fetch(`/api/memory/search?q=${encodeURIComponent(q)}&scope=${encodeURIComponent(scope)}&limit=60`);
    if(r.status === 403){ res.innerHTML = '<div class="mitem md">not authorized to browse this corpus</div>'; return; }
    const hits = (await r.json()).hits || [];
    res.innerHTML = hits.length ? '' : '<div class="mitem md">no entries</div>';
    hits.forEach(h => {
      const d = document.createElement('div'); d.className = 'mitem'; d.onclick = () => openEntryModal(h.slug);
      d.innerHTML = `<div class="mn">${esc(h.name||h.slug)}${h.shared?'<span class="sbadge">shared</span>':''}</div><div class="md">${esc(h.description||'')}</div><div class="mt">${esc(h.project)} · ${esc(h.type)}</div>`;
      res.appendChild(d);
    });
  } catch(_){

// ---- Floating agent windows ----
// Each entry: { el, bodyEl, detailData, askBox }
// The ask footer (input + button + answer slot) lives in el, OUTSIDE bodyEl,
// so tick calls to renderAgentWindowBody() never touch or recreate the input.
const agentWindows = new Map();
let awZ = 100;                  // z-index counter — raised on any window interaction
let activeWinDrag = null;       // { el, ox, oy } — set on mousedown, cleared on mouseup

// Global drag move + end (shared across all windows to avoid per-window listener spam)
document.addEventListener('mousemove', ev => {
  if (!activeWinDrag) return;
  let nx = ev.clientX - activeWinDrag.ox;
  let ny = ev.clientY - activeWinDrag.oy;
  // Clamp: keep the window fully visible (min 40px top so title stays reachable)
  nx = Math.max(0, Math.min(window.innerWidth - activeWinDrag.el.offsetWidth, nx));
  ny = Math.max(40, Math.min(window.innerHeight - 60, ny));
  activeWinDrag.el.style.left = nx + 'px';
  activeWinDrag.el.style.top = ny + 'px';
});
document.addEventListener('mouseup', () => { activeWinDrag = null; });

function openAgentWindow(name) {
  if (agentWindows.has(name)) {
    // Raise the existing window and focus its input
    const win = agentWindows.get(name);
    awZ++;
    win.el.style.zIndex = awZ;
    const inp = win.el.querySelector('.aw-ask-input');
    if (inp) inp.focus();
    return;
  }

  const layer = document.getElementById('windows');
  // Cascade-offset so new windows don't stack exactly
  const numWin = agentWindows.size;
  const offset = (numWin % 8) * 30;
  const left = Math.min(90 + offset, window.innerWidth - 390);
  const top = Math.min(80 + offset, window.innerHeight - 340);

  const el = document.createElement('div');
  el.className = 'aw-win';
  el.style.left = left + 'px';
  el.style.top = top + 'px';
  awZ++;
  el.style.zIndex = awZ;

  // Build title bar from current state (set once; not re-rendered on tick).
  // During replay `lastState` is whatever live snapshot happened to be on
  // screen when the user entered replay (SSE is paused, not cleared) — using
  // it here would risk labeling the window with a stale/unrelated agent's
  // role. inReplay routes the title bar to the reconstructed tape state
  // instead (replayAgents, from replay-player.js); the model badge has no
  // tape equivalent (BuildReplayStream doesn't carry a per-agent model), so
  // it stays hidden in replay rather than showing a live-snapshot guess.
  const a = inReplay ? {} : ((lastState.active_agents || []).find(x => x.name === name) || {});
  // The model/backend live in topology (report_host / HostBook), not active_agents.
  const topo = inReplay ? {} : ((lastState.topology || []).find(x => x.agent === name) || {});
  const model = a.model || topo.model || '';
  const leaf = a.parent ? (name.split('/').pop() || name) : name;
  const dn = displayName(leaf);
  const role = inReplay ? ((replayAgents.get(name) || {}).role || '') : (a.role || topo.role || '');
  const mi = modelInfo(model);
  // Always emit the badge span (hidden if the model isn't known yet — report_host
  // populates topology on a timer); renderAgentWindowBody fills it in on a later tick.
  const modelBadge = `<span class="aw-badge"${model ? '' : ' style="display:none"'} title="${esc((topo.backend ? topo.backend + ' · ' : '') + model)}">${esc(model ? (mi && mi.label ? mi.label : model) : '')}</span>`;

  // Title bar + body + persistent ask footer — footer is NEVER inside bodyEl
  el.innerHTML =
    `<div class="aw-title">` +
      `<b>${esc(dn)}</b>` +
      (role ? `<span class="aw-role">${esc(role)}</span>` : '') +
      modelBadge +
      `<span class="aw-close" title="close">✕</span>` +
    `</div>` +
    `<div class="aw-body"><div class="ir" style="font-style:italic;font-size:12px">loading…</div></div>` +
    `<div class="aw-footer">` +
      `<div class="aw-askbox">` +
        `<input class="aw-ask-input" id="aw-ask-${name.replace(/[^a-zA-Z0-9_-]/g,'_')}" ` +
          `placeholder="what have you done? what's blocking you?" autocomplete="off">` +
        `<button class="aw-ask-btn">ask</button>` +
      `</div>` +
      `<div class="aw-answer-slot"></div>` +
    `</div>`;

  layer.appendChild(el);

  const bodyEl = el.querySelector('.aw-body');
  const win = { el, bodyEl, detailData: null, askBox: { q: '', answer: '', loading: false } };
  agentWindows.set(name, win);

  // Raise to front on any interaction with this window
  el.addEventListener('mousedown', () => { awZ++; win.el.style.zIndex = awZ; }, true);

  // Wire close button (created once, persists — title bar innerHTML never changes after this)
  el.querySelector('.aw-close').addEventListener('click', ev => {
    ev.stopPropagation();
    agentWindows.delete(name);
    el.remove();
  });

  // Drag — title bar mousedown starts the drag; close-btn click is excluded
  const titleBar = el.querySelector('.aw-title');
  titleBar.addEventListener('mousedown', ev => {
    if (ev.target.classList.contains('aw-close')) return;
    activeWinDrag = { el, ox: ev.clientX - el.offsetLeft, oy: ev.clientY - el.offsetTop };
    ev.preventDefault();
  });

  // Per-window ask — Enter or button click
  const askInput = el.querySelector('.aw-ask-input');
  const askBtn = el.querySelector('.aw-ask-btn');
  askBtn.addEventListener('click', () => askAgentWindow(name));
  askInput.addEventListener('keydown', ev => {
    if (ev.key === 'Enter') { ev.preventDefault(); askAgentWindow(name); }
  });

  askInput.focus();

  // During replay there is no live brain to ask (requestChatter's own "never
  // touch a brain endpoint while replaying" rule, extended here) — render
  // straight from the reconstructed tape state instead of fetching
  // /api/agent, which would either 404 against a since-recorded mission or,
  // worse, silently answer for whatever mission the live brain is CURRENTLY
  // running. Live mode is unchanged: fetch detail, then render.
  if (inReplay) {
    renderAgentWindowBody(name);
  } else {
    fetchWindowDetail(name);
  }
}

async function fetchWindowDetail(name) {

      agentWindows.get(name).bodyEl.innerHTML =
        '<div class="ir" style="font-style:italic;font-size:12px">couldn\'t reach the brain — retrying…</div>';
