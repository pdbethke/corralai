<!-- Corral favicon: the wordmark's mark — an amber horseshoe / corral ring,
     open at the top (the gate) with bulged tips (the horseshoe's calkins),
     holding three dots (the herd). Matches site/public/logo-mark.svg and the
     cockpit's glowing "the corral" node. On the hero and recordings pages the
     replay player swaps in its per-skin emoji favicon at runtime (see setSkin()
     in replay-player.js); this is the static default every other page carries. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <path d="M21.5 6.47 A11 11 0 1 1 10.5 6.47" fill="none" stroke="#e8a838" stroke-width="3.6" stroke-linecap="round"/>
  <circle cx="21.5" cy="6.47" r="2.1" fill="#e8a838"/>
  <circle cx="10.5" cy="6.47" r="2.1" fill="#e8a838"/>
  <circle cx="11.6" cy="18.4" r="2.1" fill="#e8a838"/>
  <circle cx="16" cy="15" r="2.1" fill="#e8a838"/>
  <circle cx="20.4" cy="18.4" r="2.1" fill="#e8a838"/>
</svg>
