<!-- The corral mark: an amber ring (the corral) left open at the top (the
     gate) holding three dots (the herd). Echoes the cockpit's glowing "the
     corral" node with its clustered agents  no stock logo, no external font. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Corralai">
  <path d="M21.5 6.47 A11 11 0 1 1 10.5 6.47" fill="none" stroke="#e8a838" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="11.6" cy="18.2" r="1.9" fill="#e8a838"/>
  <circle cx="16" cy="14.8" r="1.9" fill="#e8a838"/>
  <circle cx="20.4" cy="18.2" r="1.9" fill="#e8a838"/>
</svg>
