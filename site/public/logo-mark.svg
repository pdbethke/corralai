<!-- The corral mark: an amber horseshoe / corral ring, open at the top (the
     gate) with bulged tips (the horseshoe's heel calkins), holding three dots
     (the herd). Reinforces the name — corralai corrals a herd of AI agents —
     and echoes the cockpit's glowing "the corral" node. No stock logo, no
     external font. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Corralai">
  <path d="M21.5 6.47 A11 11 0 1 1 10.5 6.47" fill="none" stroke="#e8a838" stroke-width="3.2" stroke-linecap="round"/>
  <circle cx="21.5" cy="6.47" r="1.9" fill="#e8a838"/>
  <circle cx="10.5" cy="6.47" r="1.9" fill="#e8a838"/>
  <circle cx="11.6" cy="18.4" r="1.9" fill="#e8a838"/>
  <circle cx="16" cy="15" r="1.9" fill="#e8a838"/>
  <circle cx="20.4" cy="18.4" r="1.9" fill="#e8a838"/>
</svg>
